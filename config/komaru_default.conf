# KomaruOS Default Configuration

[system]
hostname=komaru
brightness=70
volume=70
auto_rotate=1
vibrate_on_touch=1

[network]
wifi_enabled=0
bluetooth_enabled=0
bluetooth_name=KomaruPhone

[display]
timeout_seconds=60
font_size=0

[apps]
default_browser=komaru_browser
default_notes=komaru_notes

[security]
lock_enabled=0
lock_code=0000
